version: 3
projects:
  - dir: infra
    workflow: changegate

workflows:
  changegate:
    plan:
      steps:
        - init
        - plan:
            extra_args: ["-out", "tfplan"]
        - run: terraform show -json tfplan > tfplan.json
        - run: |
            curl -fsSL "https://raw.githubusercontent.com/Gabriel0110/changegate/vX.Y.Z/scripts/install.sh" -o /tmp/install-changegate.sh
            CHANGEGATE_VERSION=vX.Y.Z CHANGEGATE_INSTALL_DIR="$PWD/.changegate-bin" bash /tmp/install-changegate.sh
        - run: .changegate-bin/changegate scan --plan tfplan.json --mode audit --format markdown --out changegate.md
