name: changegate-audit-only

on:
  pull_request:
    paths:
      - "infra/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  changegate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: hashicorp/setup-terraform@v3
      - name: Install ChangeGate
        env:
          CHANGEGATE_VERSION: v0.2.0
          CHANGEGATE_INSTALL_DIR: ${{ runner.temp }}/changegate-bin
        run: |
          curl -fsSL "https://raw.githubusercontent.com/Gabriel0110/changegate/${CHANGEGATE_VERSION}/scripts/install.sh" -o /tmp/install-changegate.sh
          bash /tmp/install-changegate.sh
          echo "$CHANGEGATE_INSTALL_DIR" >> "$GITHUB_PATH"
      - name: Terraform plan
        working-directory: infra
        run: |
          terraform init
          terraform plan -out=tfplan
          terraform show -json tfplan > tfplan.json
      - name: ChangeGate audit review
        working-directory: infra
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          changegate scan --plan tfplan.json --mode audit --format json --out changegate.json --audit-bundle changegate-audit.zip
          changegate review github \
            --report changegate.json \
            --comment \
            --step-summary \
            --artifact "Audit bundle=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Upload audit bundle
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: changegate-audit
          path: infra/changegate-audit.zip
