name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          cache: true

      - name: Install Syft
        run: go install github.com/anchore/syft/cmd/syft@v1.20.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Validate release commit
        run: |
          go vet ./...
          go test ./...
          go run ./cmd/changegate --no-color test examples/risk-tests
          go run github.com/goreleaser/goreleaser/v2@v2.16.0 check

      - name: Distribution smoke tests
        run: |
          docker build -t changegate:release-smoke .
          docker run --rm changegate:release-smoke version
          docker run --rm -v "$PWD/examples/risk-tests/fixtures:/fixtures:ro" changegate:release-smoke scan --plan /fixtures/public-web-alb.json --format json | jq -e '.decision == "allow"'
          set +e
          docker run --rm -v "$PWD/examples/demo-public-admin-path:/demo:ro" changegate:release-smoke scan --plan /demo/tfplan.json --format json >/tmp/changegate-release-block.json
          code=$?
          set -e
          test "$code" -eq 1
          jq -e '.decision == "block"' /tmp/changegate-release-block.json
          scripts/test-npm-package.sh

      - name: Resolve image name
        run: echo "REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_ENV}"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*
            dist/checksums.txt
            dist/digests.txt

      - name: Generate Homebrew formula
        run: scripts/homebrew-formula.sh "${GITHUB_REF_NAME}" dist/checksums.txt /tmp/changegate.rb

      - name: Publish Homebrew tap
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_REPOSITORY}" || -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "Homebrew tap publishing skipped; set HOMEBREW_TAP_REPOSITORY and HOMEBREW_TAP_TOKEN to enable it."
            exit 0
          fi
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Formula
          cp /tmp/changegate.rb /tmp/homebrew-tap/Formula/changegate.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/changegate.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git commit -m "Update changegate ${GITHUB_REF_NAME}"
          git push
