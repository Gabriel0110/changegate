name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go-version:
          - "1.25.10"
          - "1.26.4"
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Format check
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race tests
        if: runner.os != 'Windows'
        run: go test -race ./...

      - name: Risk test corpus
        run: go run ./cmd/changegate --no-color test examples/risk-tests

      - name: Build
        run: go build ./cmd/changegate

  performance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          cache: true

      - name: Performance budgets
        run: go test ./internal/performance -run 'Test(SmallPlanPerformanceBudget|LargePlanMemoryBudget|ReviewIntelligencePerformanceBudget|LargeGraphPathExtractionBudget|PRCommentRenderBudget)$' -count=1

      - name: Performance benchmarks
        run: go test ./internal/performance -run '^$' -bench 'Benchmark(SmallScan|GraphPathSearch|ImpactBuild|PRCommentRender|AttackPathDetectors)$' -benchtime=1x -benchmem

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.10"
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: golangci-lint
        run: golangci-lint run --timeout 5m

  distribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Docker image smoke
        run: |
          docker build --build-arg VERSION=ci --build-arg COMMIT="${GITHUB_SHA}" --build-arg DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" -t changegate:ci .
          docker run --rm changegate:ci version
          set +e
          docker run --rm -v "$PWD/internal/cli/testdata:/plans:ro" changegate:ci scan --plan /plans/graph-plan.json --format json >/tmp/changegate-docker-scan.json
          status="$?"
          set -e
          test "${status}" -eq 1
          test -s /tmp/changegate-docker-scan.json
          jq -e '.decision == "block" and (.findings | length > 0)' /tmp/changegate-docker-scan.json >/dev/null

      - name: npm package smoke
        run: scripts/test-npm-package.sh
